<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>地球</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <main class="screen" aria-label="地球页面">
    <img class="lqip-image" src="../images/lqip/earth.jpg" alt="" aria-hidden="true" />
    <img class="full-image" decoding="async" src="../images/earth.png" alt="地球" />

    <!-- 点击地球页面右上方的月球，进入月球页面；点击演化时间轴中的地质年代，查看对应详情 -->
    <svg class="hotspots" viewBox="0 0 1672 941" preserveAspectRatio="xMidYMid meet" aria-hidden="false">
      <a href="moon.html" aria-label="查看月球页面">
        <circle class="hotspot-circle" cx="867" cy="166" r="42" />
      </a>
      <a href="https://earth-history.xiaoda.space/pages/hadean.html" aria-label="查看冥古宙页面">
        <rect class="hotspot-rect" x="823" y="814" width="80" height="34" rx="6" />
      </a>
      <a href="https://earth-history.xiaoda.space/pages/archean.html" aria-label="查看太古宙页面">
        <rect class="hotspot-rect" x="903" y="814" width="102" height="34" rx="6" />
      </a>
      <a href="https://earth-history.xiaoda.space/pages/proterozoic.html" aria-label="查看元古宙页面">
        <rect class="hotspot-rect" x="1005" y="814" width="189" height="34" rx="6" />
      </a>
      <a href="https://earth-history.xiaoda.space/pages/paleozoic.html" aria-label="查看古生代页面">
        <rect class="hotspot-rect" x="1194" y="814" width="124" height="34" rx="6" />
      </a>
      <a href="https://earth-history.xiaoda.space/pages/mesozoic.html" aria-label="查看中生代页面">
        <rect class="hotspot-rect" x="1318" y="814" width="109" height="34" rx="6" />
      </a>
      <a href="https://earth-history.xiaoda.space/pages/cenozoic.html" aria-label="查看新生代页面">
        <rect class="hotspot-rect" x="1427" y="814" width="152" height="34" rx="6" />
      </a>
    </svg>
    <a class="back" href="../index.html" aria-label="返回太阳系首页">← 返回太阳系</a>
  </main>
  <script src="../app.js"></script>
</body>
</html>
